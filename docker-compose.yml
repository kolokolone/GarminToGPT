services:
  garmintogpt:
    build: .
    image: ghcr.io/kolokolone/garmintogpt:latest
    container_name: garmintogpt
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./config:/app/config
      - ./logs:/app/logs
      - ./runtime:/app/runtime
      - ./data/garmin:/home/app/.garminconnect
    environment:
      - GARMINTOGPT_ENV=local
      - GARMINTOGPT_CONFIG=/app/config/app.yaml
    restart: unless-stopped
