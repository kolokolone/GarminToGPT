name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
      - name: Backend lint
        run: uv run ruff check backend
      - name: Backend tests
        run: uv run pytest
      - name: Frontend install
        working-directory: frontend
        run: npm install
      - name: Frontend typecheck
        working-directory: frontend
        run: npm run typecheck
      - name: Frontend tests
        working-directory: frontend
        run: npm test
      - name: Frontend build
        working-directory: frontend
        run: npm run build
      - name: Docker build
        run: docker build -t garmin-to-gpt:ci .
